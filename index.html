<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>주유소 가격 비교 계산기</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Advertisement Space Top -->
  <header class="ad-space ad-top">
    <div class="ad-placeholder">
      <span>광고</span>
    </div>
  </header>

  <main class="container">
    <h1>주유소 가격 비교 계산기</h1>
    <p class="subtitle">두 주유소를 비교해서 어디가 더 이득인지 확인해 보세요</p>

    <section class="calculator-card">
      <form id="calculator-form">
        <div class="input-row">
          <div class="input-group">
            <label for="price-a">A 주유소 가격 (원/L)</label>
            <input type="number" id="price-a" placeholder="1,950" min="0" step="1" required>
          </div>
          <div class="input-group">
            <label for="price-b">B 주유소 가격 (원/L)</label>
            <input type="number" id="price-b" placeholder="1,850" min="0" step="1" required>
          </div>
        </div>

        <div class="input-row">
          <div class="input-group">
            <label for="distance-a">A 주유소까지 거리 (km)</label>
            <input type="number" id="distance-a" placeholder="3" min="0" step="0.1" required>
          </div>
          <div class="input-group">
            <label for="distance-b">B 주유소까지 거리 (km)</label>
            <input type="number" id="distance-b" placeholder="8" min="0" step="0.1" required>
          </div>
        </div>

        <div class="input-row input-row-single">
          <div class="input-group">
            <label for="efficiency">차량 연비 (km/L)</label>
            <input type="number" id="efficiency" placeholder="12" min="0.1" step="0.1" required>
          </div>
        </div>

        <div class="input-row input-row-single">
          <div class="input-group">
            <label for="fuel-amount">주유량 (L)</label>
            <input type="number" id="fuel-amount" placeholder="50" min="0.1" step="0.1" required>
          </div>
        </div>

        <button type="submit" class="btn-calculate">계산하기</button>
      </form>

      <div id="results" class="results hidden">
        <div class="comparison-card">
          <h2>비용 비교</h2>

          <div class="result-cards">
            <div id="card-a" class="result-card">
              <div class="card-header">
                <span class="station-name">A 주유소</span>
                <span id="badge-a" class="badge"></span>
              </div>
              <div class="card-body">
                <div class="result-row">
                  <span class="label">이동 비용 (왕복)</span>
                  <span id="round-trip-a" class="value">-</span>
                </div>
                <div class="result-row">
                  <span class="label">주유 비용</span>
                  <span id="fuel-a" class="value">-</span>
                </div>
                <div class="result-row total-row">
                  <span class="label">A 주유소 총 비용</span>
                  <span id="total-a" class="value">-</span>
                </div>
              </div>
            </div>

            <div id="card-b" class="result-card">
              <div class="card-header">
                <span class="station-name">B 주유소</span>
                <span id="badge-b" class="badge"></span>
              </div>
              <div class="card-body">
                <div class="result-row">
                  <span class="label">이동 비용 (왕복)</span>
                  <span id="round-trip-b" class="value">-</span>
                </div>
                <div class="result-row">
                  <span class="label">주유 비용</span>
                  <span id="fuel-b" class="value">-</span>
                </div>
                <div class="result-row total-row">
                  <span class="label">B 주유소 총 비용</span>
                  <span id="total-b" class="value">-</span>
                </div>
              </div>
            </div>
          </div>

          <div class="result-summary">
            <div class="summary-item">
              <span class="label">더 저렴한 주유소</span>
              <span id="cheaper-option" class="value">-</span>
            </div>
            <div class="summary-item summary-savings">
              <span class="label">절약 금액</span>
              <span id="savings" class="value">-</span>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Advertisement Space Bottom -->
  <footer class="ad-space ad-bottom">
    <div class="ad-placeholder">
      <span>광고</span>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
